<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Managing Operational Tickets</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
        h1 { color: #1e293b; margin: 0; font-size: 24px; font-weight: 700; }
        .back-btn { background: #475569; color: white; padding: 10px 16px; border-radius: 6px; font-weight: 600; font-size: 14px; text-decoration: none; }
        .kpi-row { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .kpi-card { flex: 1; min-width: 220px; padding: 20px; border-radius: 6px; border: 1px solid #e2e8f0; text-align: center; color: white; }
        .kpi-card.total { background: #3b82f6; }
        .kpi-card.open { background: #ef4444; }
        .kpi-card.monitoring { background: #f59e0b; }
        .kpi-card.closed { background: #10b981; }
        .kpi-val { font-size: 28px; font-weight: bold; margin-top: 5px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: #fff; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #cbd5e1; text-align: left; }
        th { background: #e2e8f0; color: #334155; }
        .patch-btn { background: #2563eb; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div>
            <h1>Managing Operational Tickets</h1>
            <div style="color: #64748b; font-size: 14px; margin-top: 4px;">Role Level: <strong>{{ user.role }}</strong></div>
        </div>
        <a href="/" class="back-btn">← Back to Operations Desk</a>
    </div>

    <div class="kpi-row">
        <div class="kpi-card total"><div>Total Displayed</div><div class="kpi-val" id="kpi_total">0</div></div>
        <div class="kpi-card open"><div>Active Alarms (Open)</div><div class="kpi-val" id="kpi_open">0</div></div>
        <div class="kpi-card monitoring"><div>In Monitoring</div><div class="kpi-val" id="kpi_monitor">0</div></div>
        <div class="kpi-card closed"><div>Resolved Tickets</div><div class="kpi-val" id="kpi_closed">0</div></div>
    </div>

    <div class="card">
        <div style="display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
            <input type="text" id="filter_search" onkeyup="refreshLogs()" placeholder="🔍 Search Ticket ID, Circuit ID..." style="width:280px; height:40px;">
            <select id="filter_status" onchange="refreshLogs()" style="width:160px; height:40px;">
                <option value="">All Statuses</option>
                <option value="Open">Open</option>
                <option value="In Monitoring">In Monitoring</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
        <div style="overflow-x:auto; margin-top:20px;">
            <table>
                <thead>
                    <tr>
                        <th>Ticket #</th>
                        <th>Circuit ID</th>
                        <th>Alarm Subject</th>
                        <th>Open BY</th>
                        <th>Closed BY</th>
                        <th>Status</th>
                        <th>Duration</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Layer with Snapshot Integration -->
<div id="statusModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.4); justify-content:center; align-items:center;">
    <div class="card" style="background:white; width:410px; padding:25px; border-radius:8px;">
        <h4 style="margin-top:0;">Modify Ticket Operational Status</h4>
        <input type="hidden" id="modal_ticket_id">
        <div class="form-group">
            <label>Target Status State</label>
            <select id="modal_status" style="width:100%;">
                <option value="Open">Open</option>
                <option value="In Monitoring">In Monitoring</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
        <div class="form-group">
            <label>Update Remarks / Closure Notes</label>
            <textarea id="modalRemarkNote" rows="3" placeholder="Provide details..." style="width: 100%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 8px;"></textarea>
        </div>
        <div class="form-group">
            <label>Snapshot Attachment (Optional)</label>
            <input type="file" id="modal_status_file" accept="image/*" style="width:100%;">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button type="button" onclick="closeModal()" style="background:#cbd5e1; padding:8px 15px; border:none; border-radius:4px;">Cancel</button>
            <button type="button" onclick="commitStatusUpdate()" style="background:#10b981; color:white; padding:8px 15px; border:none; border-radius:4px;">Update Record</button>
        </div>
    </div>
</div>

<script>
const userRole = "{{ user.role }}";
function openStatusModal(id, currentStatus) {
    if(userRole !== 'admin') { alert('Access Denied: Admin clearance required.'); return; }
    document.getElementById('modal_ticket_id').value = id;
    document.getElementById('modal_status').value = currentStatus;
    document.getElementById('modalRemarkNote').value = '';
    document.getElementById('modal_status_file').value = '';
    document.getElementById('statusModal').style.display = 'flex';
}
function closeModal() { document.getElementById('statusModal').style.display = 'none'; }

async function commitStatusUpdate() {
    const ticketId = document.getElementById('modal_ticket_id').value;
    const status = document.getElementById('modal_status').value;
    const remarkNote = document.getElementById('modalRemarkNote').value.trim();
    const fileSelector = document.getElementById('modal_status_file');

    // Create a plain object payload to match backend dictionary expectations
    const payload = {
        ticket_id: parseInt(ticketId) || ticketId,
        status: status,
        remark_note: remarkNote,
        attachment: null
    };

    // Encode file to Base64 data string if an attachment is provided
    if (fileSelector.files.length > 0) {
        try {
            payload.attachment = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(fileSelector.files[0]);
                reader.onload = () => resolve(reader.result);
                reader.onerror = err => reject(err);
            });
        } catch (fileErr) {
            alert('File Reading Error: ' + fileErr.message);
            return;
        }
    }

    try {
        const res = await fetch('/api/ticket/update-status', { 
            method: 'POST', 
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload) 
        });

        if(res.ok) { 
            closeModal(); 
            refreshLogs(); 
        } else { 
            const err = await res.json();
            let readableError = 'Failed to update.';
            
            if (err && err.detail) {
                if (typeof err.detail === 'string') {
                    readableError = err.detail;
                } else if (Array.isArray(err.detail)) {
                    readableError = err.detail.map(d => `${d.loc ? d.loc.join('.') : 'Field'}: ${d.msg}`).join('\n');
                } else if (typeof err.detail === 'object') {
                    readableError = JSON.stringify(err.detail);
                }
            }
            throw new Error(readableError);
        }
    } catch(e) { 
        alert('Operational Error:\n' + e.message); 
    }
}

// Global variable to keep track of the background refresh timer
let autoRefreshInterval = null;

async function refreshLogs() {
    try {
        const search = document.getElementById('filter_search').value;
        const status = document.getElementById('filter_status').value;
        const res = await fetch(`/api/tickets/recent?limit=50&search=${encodeURIComponent(search)}&status=${status}`);
        const tickets = await res.json();
        const body = document.getElementById('logTableBody');
        body.innerHTML = '';
        
        let openCount = 0, monitorCount = 0, closedCount = 0;
        const now = new Date();

        tickets.forEach(t => {
            if (t.status === 'Open') openCount++;
            else if (t.status === 'In Monitoring') monitorCount++;
            else if (t.status === 'Closed') closedCount++;

            // --- SLA AGING CALCULATION ---
            let ageDisplay = '--';
            let rowStyle = '';
            
            if (t.status !== 'Closed' && t.created_at) {
                const createdTime = new Date(t.created_at);
                const ageMinutes = Math.floor((now - createdTime) / 60000);
                
                if (ageMinutes < 60) {
                    ageDisplay = `${ageMinutes} Mins`;
                } else {
                    const hours = Math.floor(ageMinutes / 60);
                    const mins = ageMinutes % 60;
                    ageDisplay = `${hours}h ${mins}m`;
                }

                // If an open ticket sits for more than 45 minutes, highlight it subtly in red
                if (t.status === 'Open' && ageMinutes >= 45) {
                    rowStyle = 'style="background-color: #fff5f5; border-left: 4px solid #ef4444;"';
                }
            } else if (t.status === 'Closed') {
                ageDisplay = `${t.resolution_minutes || 0} Mins`;
            }

            body.innerHTML += `
            <tr ${rowStyle}>
                <td style="font-weight:bold;">${t.ticket_id}</td>
                <td>${t.circuit_id}</td>
                <td>${t.issue_category}</td>
                <td>${t.open_by_name}</td>
                <td>${t.closed_by_name}</td>
                <td><span style="padding:3px 8px; font-size:11px; border-radius:10px; font-weight:bold; background:${t.status==='Closed'?'#d1fae5;color:#065f46':t.status==='In Monitoring'?'#fef3c7;color:#d97706':'#fee2e2;color:#991b1b'}">${t.status}</span></td>
                <td>${ageDisplay}</td>
                <td><button type="button" class="patch-btn" onclick="openStatusModal('${t.raw_ticket_id}', '${t.status}')">Modify</button></td>
            </tr>`;
        });

        document.getElementById('kpi_total').textContent = tickets.length;
        document.getElementById('kpi_open').textContent = openCount;
        document.getElementById('kpi_monitor').textContent = monitorCount;
        document.getElementById('kpi_closed').textContent = closedCount;
    } catch(err) { 
        console.error("Dashboard Polling Error:", err); 
    }
}

// Initialize application and establish the 30-second live loop
function startDashboardEngine() {
    refreshLogs(); // Run immediately on load
    
    // Clear any existing intervals to prevent memory leaks or racing requests
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    
    // Poll the backend API every 30 seconds quietly
    autoRefreshInterval = setInterval(() => {
        // Only auto-refresh if the engineer isn't actively typing a search query
        const searchInput = document.getElementById('filter_search');
        if (document.activeElement !== searchInput || searchInput.value.trim() === "") {
            refreshLogs();
        }
    }, 30000); 
}

window.addEventListener('DOMContentLoaded', startDashboardEngine);



</script>
</body>
</html>
