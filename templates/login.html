<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Gatekeeper Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; box-sizing: border-box; border: 1px solid #334155; }
        h2 { color: #f8fafc; margin: 0 0 8px 0; text-align: center; font-size: 22px; font-weight: 700; }
        p { color: #94a3b8; text-align: center; margin: 0 0 24px 0; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #cbd5e1; font-weight: 600; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; color: white; font-size: 15px; transition: border 0.2s; }
        input:focus { border-color: #3b82f6; outline: none; }
        button { background: #2563eb; color: white; font-weight: bold; font-size: 15px; border: none; padding: 14px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        
        /* Styled warning notice container */
        .error-alert {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Teleglobal NOC Suite</h2>
        <p>Operational Authentication Service</p>
        
        {% if error %}
        <div class="error-alert">
            {{ error }}
        </div>
        {% endif %}

        <form action="/api/auth/login" method="POST">
            <div class="form-group">
                <label>System Username</label>
                <input type="text" name="username" placeholder="e.g., dhananjay" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit">Authenticate Session</button>
        </form>
    </div>
</body>
</html>
