<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Circuits DB</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
        h1 { color: #1e293b; margin: 0; font-size: 24px; font-weight: 700; }
        .back-badge { background: #475569; color: white; padding: 10px 16px; border-radius: 6px; font-weight: 600; font-size: 14px; text-decoration: none; display: inline-block; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: #fff; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        .submit-btn { background: #10b981; color: white; border: none; padding: 14px; width: 100%; cursor: pointer; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 15px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .status-msg { padding: 12px; margin-top: 15px; border-radius: 4px; font-weight: bold; display: none; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #cbd5e1; text-align: left; }
        th { background: #e2e8f0; color: #334155; }
        @media (max-width: 768px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>Client Database Administration (Add / Edit Circuits)</h1>
        <a href="/" class="back-badge">← Back to Dashboard</a>
    </div>

    <div class="card">
        <h3>Add / Update Customer Circuit Record</h3>
        <form id="addCircuitForm" onsubmit="addCircuitRecord(event)">
            <div class="row">
                <div class="form-group col"><label>Circuit ID *</label><input type="text" id="new_cid" placeholder="e.g., CKT-PUN-0591" required></div>
                <div class="form-group col"><label>Customer Name *</label><input type="text" id="new_name" required></div>
            </div>
            <div class="row">
                <div class="form-group col"><label>Company Name</label><input type="text" id="new_comp"></div>
                <div class="form-group col"><label>Customer Email Target *</label><input type="email" id="new_email" required></div>
            </div>
            <div class="row">
                <div class="form-group col"><label>Phone Number</label><input type="text" id="new_phone"></div>
                <div class="form-group col"><label>Site / POP Address</label><input type="text" id="new_addr"></div>
            </div>
            <button type="submit" class="submit-btn">Save Circuit Record to DB</button>
        </form>
        <div id="dbStatusBox" class="status-msg"></div>
    </div>

    <div class="card">
        <h3>Registered Circuit Matrix View</h3>
        <input type="text" id="circuit_db_filter" onkeyup="filterCircuitsMasterTable()" placeholder="🔍 Search records dynamically by using Circuit ID, Customer Name, or Contact Number instantly...">
        <div style="overflow-x:auto; margin-top:15px;">
            <table>
                <thead>
                    <tr>
                        <th>Circuit ID</th>
                        <th>Customer Name</th>
                        <th>Company</th>
                        <th>Target Email</th>
                        <th>Contact Phone</th>
                        <th>Site Address</th>
                    </tr>
                </thead>
                <tbody id="circuitMasterTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function loadAllCircuits() {
    try {
        const res = await fetch('/api/admin/circuits/all');
        const data = await res.json();
        const tbody = document.getElementById('circuitMasterTableBody');
        tbody.innerHTML = '';
        data.forEach(c => {
            tbody.innerHTML += `<tr>
                <td style="font-weight:bold; font-family:monospace;">${c.circuit_id}</td>
                <td>${c.customer_name}</td>
                <td>${c.company_name || '--'}</td>
                <td>${c.customer_email}</td>
                <td>${c.phone_number || '--'}</td>
                <td>${c.address || '--'}</td>
            </tr>`;
        });
    } catch(e) { console.error(e); }
}

function filterCircuitsMasterTable() {
    const filter = document.getElementById('circuit_db_filter').value.toLowerCase();
    const rows = document.querySelectorAll('#circuitMasterTableBody tr');
    rows.forEach(row => {
        const cid = row.children[0].textContent.toLowerCase();
        const name = row.children[1].textContent.toLowerCase();
        const phone = row.children[4].textContent.toLowerCase();
        if (cid.includes(filter) || name.includes(filter) || phone.includes(filter)) {
            row.style.display = '';
        } else { row.style.display = 'none'; }
    });
}

async function addCircuitRecord(e) {
    e.preventDefault();
    const statusBox = document.getElementById('dbStatusBox');
    statusBox.style.display = 'block'; statusBox.style.background = '#e0f2fe'; statusBox.style.color = '#0369a1';
    statusBox.textContent = 'Syncing parameters...';
    
    const payload = {
        circuit_id: document.getElementById('new_cid').value.trim(),
        customer_name: document.getElementById('new_name').value.trim(),
        company_name: document.getElementById('new_comp').value.trim(),
        customer_email: document.getElementById('new_email').value.trim(),
        phone_number: document.getElementById('new_phone').value.trim(),
        address: document.getElementById('new_addr').value.trim()
    };

    try {
        const res = await fetch('/api/admin/circuit/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            statusBox.style.background = '#d1fae5'; statusBox.style.color = '#065f46';
            statusBox.textContent = 'Success: Reference committed cleanly.';
            document.getElementById('addCircuitForm').reset();
            loadAllCircuits();
        } else { throw new Error('Conflict occurred during serialization.'); }
    } catch(err) {
        statusBox.style.background = '#fee2e2'; statusBox.style.color = '#991b1b';
        statusBox.textContent = `Error: ${err.message}`;
    }
}

window.addEventListener('DOMContentLoaded', loadAllCircuits);
</script>
</body>
</html>
